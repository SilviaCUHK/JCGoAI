<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親子工作坊 - 視覺化學習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .copy-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#f0f2f5] p-4 md:p-8">

    <div class="max-w-6xl mx-auto mb-8">
        <div class="bg-[#1a3646] p-6 rounded-lg text-white mb-6">
            <h1 class="text-3xl font-bold">快問慢想實驗室</h1>
            <p class="mt-2 opacity-80">按活動內容，複製後貼到 AI 平台。每個按鈕只複製該步驟需要貼上的文字。</p>
        </div>
        
        <h2 class="text-3xl font-bold text-slate-800 mb-4">活動三：由快問變成慢問</h2>
        
        <div class="flex gap-2 mb-8">
            <button class="bg-white px-6 py-2 rounded-full shadow-sm border font-medium">全部</button>
            <button class="bg-[#137a74] text-white px-6 py-2 rounded-full shadow-sm font-medium">學生</button>
            <button class="bg-white px-6 py-2 rounded-full shadow-sm border font-medium text-slate-500">家長</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-white rounded-xl shadow-md border-l-4 border-blue-600 p-6 flex flex-col">
            <h3 class="text-xl font-bold mb-6 text-slate-700">學生快問 例子</h3>
            
            <div class="space-y-8 flex-1">
                <div class="flex items-center gap-2">
                    <div class="flex-1">
                        <span class="text-sm font-bold text-slate-400 block mb-1">第 1 步 <span class="font-normal">先貼上快問</span></span>
                        <div id="q1-1" class="bg-slate-50 p-3 rounded-lg border text-slate-700">我嚟緊考試考得差點算好？</div>
                    </div>
                    <button onclick="copy('q1-1')" class="copy-btn bg-[#137a74] text-white px-5 py-3 rounded-lg font-bold">複製</button>
                </div>

                <div class="flex items-end gap-2 border-t pt-4">
                    <div class="flex-1">
                        <span class="text-sm font-bold text-slate-400 block mb-1">第 2 步 <span class="font-normal">Gems 追問後貼上補充資料</span></span>
                        <div id="q1-2" class="bg-slate-50 p-3 rounded-lg border text-sm text-slate-600 leading-relaxed h-40 overflow-y-auto">
                            1. **情境：** 剛剛完成嘅考試，中英文表現遠低過預期... (這裡可以貼上長文字內容)
                        </div>
                    </div>
                    <button onclick="copy('q1-2')" class="copy-btn bg-[#137a74] text-white px-5 py-3 rounded-lg font-bold">複製</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md border-l-4 border-orange-500 p-6 flex flex-col">
            <h3 class="text-xl font-bold mb-6 text-slate-700">學生快問：問題 1</h3>
            <p class="text-slate-400 text-sm italic">內容仿照上述結構填寫即可</p>
        </div>

    </div>

    <script>
        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const oldText = btn.innerText;
                btn.innerText = '已複製';
                btn.style.backgroundColor = '#10b981'; // 變綠色
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.backgroundColor = '#137a74';
                }, 1500);
            });
        }
    </script>
</body>
</html>
